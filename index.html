<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Atar AR Experience</title>

  <!--
    LOAD ORDER IS CRITICAL:
    1. A-Frame first
    2. MindAR A-Frame integration second
  -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif;
      transition: opacity 0.6s;
    }
    #loading-overlay .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #5577ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 15px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      color: #fff; padding: 11px 22px;
      border-radius: 99px;
      font-family: -apple-system, sans-serif;
      font-size: 14px; pointer-events: none;
      z-index: 100; display: none; white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR…</p>
  </div>

  <div id="scan-hint">📷 Point at the target image</div>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <!-- Image Target #0 matches imgtracker.png -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box
        color="#5577ff"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        material="color: #5577ff"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 3000; easing: linear"
      ></a-box>
    </a-entity>

    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" position="20 20 10" intensity="1"></a-light>

  </a-scene>

  <script>
    const overlay  = document.getElementById('loading-overlay');
    const scanHint = document.getElementById('scan-hint');
    const scene    = document.querySelector('a-scene');

    scene.addEventListener('loaded', function () {
      const arSystem = scene.systems['mindar-image-system'];
      if (!arSystem) return;
      arSystem.el.addEventListener('arReady', function () {
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 650);
        scanHint.style.display = 'block';
      });
    });

    document.querySelectorAll('[mindar-image-target]').forEach(function (target) {
      target.addEventListener('targetFound', function () { scanHint.style.display = 'none'; });
      target.addEventListener('targetLost',  function () { scanHint.style.display = 'block'; });
    });
  </script>

</body>
</html>
