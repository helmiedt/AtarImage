<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Atar AR Experience</title>
  <meta name="description" content="Atar AR Image Tracking Experience">

  <!-- 8th Wall Web AR Runtime (loaded from CDN) -->
  <script async src="https://apps.8thwall.com/xrweb?appKey=REPLACE_WITH_YOUR_8THWALL_APP_KEY"></script>

  <!-- A-Frame for 3D scene rendering -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- 8th Wall A-Frame extras -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.4.0.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      font-family: sans-serif;
    }
    #loading-screen .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #5577ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-prompt {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-family: sans-serif;
      font-size: 15px;
      pointer-events: none;
      z-index: 100;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading AR Experience…</p>
  </div>

  <!-- Scan prompt shown after AR starts -->
  <div id="scan-prompt">📷 Point camera at the image target</div>

  <!-- A-Frame AR Scene -->
  <a-scene
    xrweb="allowedDevices: any"
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <!-- Assets -->
    <a-assets>
      <img id="imgtracker" src="assets/imgtracker.png" crossorigin="anonymous">
    </a-assets>

    <!-- Camera -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false"
    ></a-camera>

    <!-- Image Target: when imgtracker.png is detected, show the blue box -->
    <xrextras-named-image-target name="imgtracker">

      <!-- Blue box matching original .expanse.json values -->
      <a-box
        id="ar-box"
        color="#5577ff"
        position="0 0.11490759 0.19112854"
        scale="0.23502870 0.26697225 0.20815126"
        material="shader: flat; color: #5577ff"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
      ></a-box>

    </xrextras-named-image-target>

    <!-- Lights -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="20 20 10" intensity="1"></a-light>

  </a-scene>

  <script src="ar-init.js"></script>

</body>
</html>
