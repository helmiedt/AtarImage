<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Atar AR Experience</title>

  <!-- A-Frame FIRST, then MindAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    a-scene {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    canvas, video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
    }

    #loading-overlay {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
      font-family: -apple-system, sans-serif;
      transition: opacity 0.6s;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #5577ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 18px;
    }
    #loading-overlay p { font-size: 16px; opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff; padding: 12px 24px;
      border-radius: 99px;
      font-family: -apple-system, sans-serif;
      font-size: 15px; pointer-events: none;
      z-index: 9998; display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Starting AR...</p>
  </div>

  <div id="scan-hint">Point at the target image</div>

  <!-- NO embedded attribute -->
  <a-scene
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box
        position="0 0 0"
        scale="0.5 0.5 0.5"
        color="#5577ff"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 2500; easing: linear"
      ></a-box>
    </a-entity>

    <a-light type="ambient"     color="#fff" intensity="1.5"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>
  </a-scene>

  <script>
    var overlay  = document.getElementById('loading-overlay');
    var scanHint = document.getElementById('scan-hint');
    var scene    = document.querySelector('a-scene');

    function hideOverlay() {
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 700);
      scanHint.style.display = 'block';
    }

    scene.addEventListener('loaded', function () {
      var sys = scene.systems['mindar-image-system'];
      if (sys) {
        sys.el.addEventListener('arReady', hideOverlay);
      }
      setTimeout(hideOverlay, 8000);
    });

    document.querySelectorAll('[mindar-image-target]').forEach(function(t) {
      t.addEventListener('targetFound', function() { scanHint.style.display = 'none'; });
      t.addEventListener('targetLost',  function() { scanHint.style.display = 'block'; });
    });
  </script>

</body>
</html>
